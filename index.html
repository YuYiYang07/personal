    <style>
        /* Custom "Apple-like" Animations and Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; color: #111; }
        
        /* The "Empty Inside" Dynamic Scroll Font Effect */
        .outline-text {
            -webkit-text-stroke: 1px rgba(0,0,0,0.2);
            color: transparent;
            transition: all 0.5s ease;
        }
        .outline-text:hover {
            color: #000;
            -webkit-text-stroke: 0px;
        }

        /* Smooth Fade In */
        .fade-in { animation: fadeIn 1.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b border-gray-100 z-50">

            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tight mb-6 leading-tight">
    Engineering <br>
    <span id="typewriter" class="outline-text cursor-default"></span><span class="animate-pulse">|</span>
</h1>
<script>
    const text = "Intelligence.";
    const el = document.getElementById('typewriter');
    let i = 0;
    
    function type() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 150); // Typing speed
        }
    }
    // Start typing after 0.5s
    setTimeout(type, 500);
</script>
